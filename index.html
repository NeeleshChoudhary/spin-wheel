<!DOCTYPE html>
<html>
<head>
<title>Gender Reveal Spin</title>
<style>
body {
  text-align: center;
  font-family: Arial;
  background: #ffe6f0;
}
#wheel {
  margin-top: 50px;
  font-size: 40px;
}
button {
  padding: 15px 30px;
  font-size: 20px;
  background-color: hotpink;
  color: white;
  border: none;
  border-radius: 10px;
}
</style>
</head>
<body>

<h1>Spin the Wheel 🎡</h1>
<div id="wheel">🎀 ??? 🎀</div>
<br>
<button onclick="spinWheel()">Spin</button>

<script>
function spinWheel() {
  document.getElementById("wheel").innerHTML = "Spinning...";
  
  setTimeout(function() {
    document.getElementById("wheel").innerHTML = "🎀 IT’S A GIRL 💗 🎀";
  }, 2000);
}
</script>

</body>
</html>
