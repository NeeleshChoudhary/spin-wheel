
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gender Reveal Spin Wheel</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #ffe6f0, #ffffff);
  text-align: center;
  padding-top: 40px;
}

h1 {
  color: #ff4081;
}

#wheel-container {
  position: relative;
  width: 320px;
  margin: auto;
}

#wheel {
  width: 320px;
  height: 320px;
  border-radius: 50%;
  border: 8px solid #444;
  background: conic-gradient(
    #4da6ff 0deg 180deg,
    #ff66b2 180deg 360deg
  );
  transition: transform 4s cubic-bezier(.17,.67,.83,.67);
}

#pointer {
  width: 0;
  height: 0;
  border-left: 15px solid transparent;
  border-right: 15px solid transparent;
  border-bottom: 30px solid #333;
  position: absolute;
  top: -30px;
  left: 145px;
}

.label {
  position: absolute;
  width: 100%;
  top: 45%;
  font-weight: bold;
  font-size: 20px;
}

#boy {
  transform: rotate(90deg);
  color: white;
}

#girl {
  transform: rotate(270deg);
  color: white;
}

button {
  margin-top: 30px;
  padding: 15px 40px;
  font-size: 18px;
  background: #ff4081;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #e73370;
}

#result {
  margin-top: 25px;
  font-size: 26px;
  font-weight: bold;
  color: #ff4081;
}

.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  background: pink;
  top: 0;
  animation: fall 3s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<h1>Spin the Wheel 🎡</h1>

<div id="wheel-container">
  <div id="pointer"></div>
  <div id="wheel"></div>

  <div class="label" id="boy">👶 It's a Boy</div>
  <div class="label" id="girl">🎀 It's a Girl</div>
</div>

<button onclick="spinWheel()">SPIN</button>

<div id="result"></div>

<script>
let spinning = false;

function spinWheel() {
  if (spinning) return;

  spinning = true;

  const wheel = document.getElementById("wheel");

  // multiple spins + stop exactly on GIRL section
  const spins = 5;
  const girlAngle = 270; // girl slice location
  const finalRotation = spins * 360 + girlAngle;

  wheel.style.transform = `rotate(${finalRotation}deg)`;

  setTimeout(() => {
    document.getElementById("result").innerHTML = "🎀 IT'S A GIRL 🎀";
    launchConfetti();
    spinning = false;
  }, 4000);
}

function launchConfetti() {
  for (let i = 0; i < 80; i++) {
    const conf = document.createElement("div");
    conf.classList.add("confetti");
    conf.style.left = Math.random() * window.innerWidth + "px";
    conf.style.background = Math.random() > 0.5 ? "#ff66b2" : "#ffc0cb";
    conf.style.animationDuration = (Math.random() * 2 + 2) + "s";
    document.body.appendChild(conf);

    setTimeout(() => conf.remove(), 3000);
  }
}
</script>

</body>
</html>
