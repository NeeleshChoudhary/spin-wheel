```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin The Wheel</title>

<style>

body{
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
background: linear-gradient(180deg,#f7eef3,#ffffff);
text-align:center;
margin:0;
padding:30px;
}

h1{
color:#e94b88;
font-weight:600;
letter-spacing:1px;
}

#wheelContainer{
position:relative;
width:420px;
margin:auto;
}

#pointer{
position:absolute;
left:50%;
transform:translateX(-50%);
top:-18px;
width:0;
height:0;
border-left:16px solid transparent;
border-right:16px solid transparent;
border-bottom:28px solid #333;
z-index:10;
}

#wheel{
width:420px;
height:420px;
border-radius:50%;
border:10px solid #444;
position:relative;

background:conic-gradient(
#7fb3ff 0deg 45deg,
#ff9fc4 45deg 90deg,
#7fb3ff 90deg 135deg,
#ff9fc4 135deg 180deg,
#7fb3ff 180deg 225deg,
#ff9fc4 225deg 270deg,
#7fb3ff 270deg 315deg,
#ff9fc4 315deg 360deg
);

transition: transform 6s cubic-bezier(.17,.67,.2,1);
}

.sliceText{
position:absolute;
width:100%;
top:50%;
left:50%;
transform-origin:center;
font-weight:600;
color:white;
text-shadow:0 2px 4px rgba(0,0,0,0.4);
font-size:16px;
}

#centerCap{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:70px;
height:70px;
border-radius:50%;
background: radial-gradient(circle,#ffe4f0,#ff7fb2);
border:5px solid white;
box-shadow:0 4px 10px rgba(0,0,0,0.25);
z-index:5;
}

button{
margin-top:35px;
padding:16px 40px;
font-size:18px;
background:#e94b88;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#d93b77;
}

#result{
margin-top:25px;
font-size:30px;
font-weight:700;
color:#e94b88;
}

</style>
</head>

<body>

<h1>Spin the Wheel 🎡</h1>

<div id="wheelContainer">

<div id="pointer"></div>

<div id="wheel"></div>

<div id="centerCap"></div>

</div>

<button onclick="spinWheel()">SPIN</button>

<div id="result"></div>

<script>

const wheel=document.getElementById("wheel");

const labels=[
"👶 Boy",
"🎀 Girl",
"👶 Boy",
"🎀 Girl",
"👶 Boy",
"🎀 Girl",
"👶 Boy",
"🎀 Girl"
];

const sliceAngle=360/labels.length;

labels.forEach((text,i)=>{

let el=document.createElement("div");
el.className="sliceText";

let rotate=i*sliceAngle + sliceAngle/2;

el.style.transform=`translate(-50%,-50%) rotate(${rotate}deg) translate(140px) rotate(90deg)`;

el.innerHTML=text;

wheel.appendChild(el);

});

let spinning=false;

function spinWheel(){

if(spinning) return;

spinning=true;

const spins=6;

/* choose GIRL slice index (1,3,5,7) */
const girlSlices=[1,3,5,7];

const chosen=girlSlices[Math.floor(Math.random()*girlSlices.length)];

const stopAngle=chosen*sliceAngle + sliceAngle/2;

const finalRotation=spins*360 + (360-stopAngle);

wheel.style.transform=`rotate(${finalRotation}deg)`;

setTimeout(()=>{
document.getElementById("result").innerHTML="🎀 IT'S A GIRL 🎀";
spinning=false;
},6000);

}

</script>

</body>
</html>
