```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spin to Reveal 👶</title>

<style>
  body{
    margin:0;
    font-family: system-ui, -apple-system, Arial;
    text-align:center;
    background: linear-gradient(180deg,#ffe6f2,#ffffff);
    overflow-x:hidden;
  }

  h1{
    margin-top:25px;
    color:#ff3c8d;
  }

  #game{
    width:340px;
    margin:auto;
    position:relative;
    margin-top:10px;
  }

  #pointer{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:-18px;
    width:0;
    height:0;
    border-left:14px solid transparent;
    border-right:14px solid transparent;
    border-bottom:26px solid #333;
    z-index:2;
  }

  #wheel{
    width:320px;
    height:320px;
    border-radius:50%;
    border:10px solid #444;
    margin:auto;
    background:
      conic-gradient(
        #5bb3ff 0deg 180deg,
        #ff5ca8 180deg 360deg
      );
    transition: transform 5s cubic-bezier(.17,.67,.2,1);
  }

  .label{
    position:absolute;
    width:100%;
    top:48%;
    font-weight:bold;
    color:white;
    font-size:22px;
    text-shadow:0 2px 3px rgba(0,0,0,0.4);
  }

  #boy{ transform: rotate(90deg); }
  #girl{ transform: rotate(270deg); }

  button{
    margin-top:28px;
    padding:14px 36px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#ff3c8d;
    color:white;
    cursor:pointer;
  }

  button:hover{ background:#e52e7d; }

  #countdown{
    font-size:40px;
    font-weight:bold;
    margin-top:20px;
    color:#444;
  }

  #result{
    margin-top:18px;
    font-size:30px;
    font-weight:bold;
    color:#ff3c8d;
  }

  /* Confetti */
  .confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:-10px;
    animation:fall linear forwards;
  }

  @keyframes fall{
    to{
      transform:translateY(100vh) rotate(720deg);
      opacity:0;
    }
  }

  /* Balloons */
  .balloon{
    position:fixed;
    bottom:-120px;
    width:40px;
    height:50px;
    border-radius:50%;
    animation:floatUp 7s linear forwards;
  }

  @keyframes floatUp{
    to{
      transform:translateY(-120vh);
      opacity:0;
    }
  }

</style>
</head>

<body>

<h1>Spin the Wheel 🎡</h1>
<p>Find out our baby's gender!</p>

<div id="game">

<div id="pointer"></div>

<div id="wheel"></div>

<div class="label" id="boy">👶 It's a Boy</div>
<div class="label" id="girl">🎀 It's a Girl</div>

</div>

<div id="countdown"></div>

<button onclick="startReveal()">SPIN</button>

<div id="result"></div>

<audio id="music">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2c0e8d19b2.mp3?filename=celebration-110737.mp3" type="audio/mpeg">
</audio>

<script>

let spinning=false;

function startReveal(){

 if(spinning) return;
 spinning=true;

 const countdownEl=document.getElementById("countdown");
 let count=3;

 countdownEl.innerHTML=count;

 const interval=setInterval(()=>{
   count--;
   if(count>0){
     countdownEl.innerHTML=count;
   }else{
     clearInterval(interval);
     countdownEl.innerHTML="GO!";
     setTimeout(spinWheel,600);
   }
 },800);

}

function spinWheel(){

 const wheel=document.getElementById("wheel");

 const spins=6;
 const girlAngle=270;

 const finalAngle=spins*360 + girlAngle;

 wheel.style.transform=`rotate(${finalAngle}deg)`;

 setTimeout(()=>{
   revealGirl();
 },5000);

}

function revealGirl(){

 document.getElementById("result").innerHTML="🎀 IT'S A GIRL 🎀";

 launchConfetti();
 launchBalloons();

 const music=document.getElementById("music");
 music.play().catch(()=>{});

}

function launchConfetti(){

 for(let i=0;i<120;i++){

   const c=document.createElement("div");
   c.className="confetti";

   c.style.left=Math.random()*100+"vw";
   c.style.background=Math.random()>0.5?"#ff5ca8":"#ffd1e6";
   c.style.animationDuration=(Math.random()*3+2)+"s";

   document.body.appendChild(c);

   setTimeout(()=>c.remove(),5000);
 }

}

function launchBalloons(){

 for(let i=0;i<15;i++){

   const b=document.createElement("div");
   b.className="balloon";

   b.style.left=Math.random()*100+"vw";
   b.style.background=Math.random()>0.5?"#ff5ca8":"#ffc0cb";

   document.body.appendChild(b);

   setTimeout(()=>b.remove(),7000);

 }

}

</script>

</body>
</html>
